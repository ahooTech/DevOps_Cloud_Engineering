# virtualization/hybrid-vsphere-oci/hcs/hcs-config.yaml

# HCS Bare-Metal Bridge Configuration
# Simulation template - adapt for real HCS API

bridge_sync:
  enabled: true
  target:
    ip: "VARIABLE:bridge_node_ip"  # Replaced by Terraform
    port: 8443
    protocol: tls
  auth:
    method: certificate
    cert_path: /etc/hcs/certs/bridge.crt
    key_path: /etc/hcs/certs/bridge.key

bare_metal:
  flavor: hcs.bm.2xlarge
  image: ubuntu-22.04-hcs
  network:
    vpc_id: "${hcs_vpc_id}"  # Injected by Terraform
    subnet_id: "${hcs_subnet_id}"
    security_groups:
      - hcs-bridge-sg
  storage:
    system_disk:
      size: 100
      type: SSD
    data_disks:
      - size: 500
        type: HDD

# Cloud-init for first-boot hardening (parity with Step 2)
user_data: |
  #cloud-config
  packages:
    - qemu-guest-agent
    - open-vm-tools
    - auditd
  runcmd:
    - echo "HCS bridge sync target: {{ bridge_node_ip }}" >> /var/log/hcs-bridge.log

# Output for validation
outputs:
  status: "HCS bare-metal configured to peer with ${bridge_sync.target.ip}"
  validation_command: "hcs-cli vm show hybrid-bridge-sync"