
---
- name: Apply Multi-OS Hardening Baseline (Project 1 Runbook - FINAL)
  hosts: all
  become: true
  gather_facts: true

  vars:
    ssh_port: 22

  tasks:

    # 🌐 Kernel & Network Hardening
    - name: Apply sysctl hardening parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: "net.ipv4.ip_forward", value: "0" }
        - { key: "net.ipv4.conf.all.rp_filter", value: "1" }
        - { key: "kernel.dmesg_restrict", value: "1" }
        - { key: "kernel.kptr_restrict", value: "2" }
        - { key: "net.ipv4.tcp_syncookies", value: "1" }
        - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
        - { key: "net.ipv6.conf.all.accept_redirects", value: "0" }

    # 🔐 SSH Hardening
    - name: Harden SSH configuration
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        validate: "sshd -t -f %s"
      loop:
        - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
        - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
        - { regexp: "^#?PubkeyAuthentication", line: "PubkeyAuthentication yes" }
      notify: restart ssh

    # 🚨 Install fail2ban
    - name: Install fail2ban
      ansible.builtin.package:
        name: fail2ban
        state: present

    # 🚨 Ensure fail2ban is running
    - name: Ensure fail2ban service is running
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: true
      

    # 🛡️ Install firewall packages (RHEL)
    - name: Install firewalld package
      ansible.builtin.package:
        name: firewalld
        state: present
      when: ansible_os_family == "RedHat"

    # 🛡️ Start firewalld
    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true
      when: ansible_os_family == "RedHat"

    # 🛡️ Allow SSH through firewalld
    - name: Allow SSH through firewalld
      ansible.builtin.command:
        cmd: firewall-cmd --permanent --add-service=ssh
      changed_when: true
      when: ansible_os_family == "RedHat"
      notify: reload firewalld

    # 🛡️ Ubuntu/Debian Firewall
    - name: Install UFW
      ansible.builtin.package:
        name: ufw
        state: present
      when: ansible_os_family == "Debian"

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp
      when: ansible_os_family == "Debian"

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      when: ansible_os_family == "Debian"

    # 📜 Install auditd (RHEL)
    - name: Install audit package
      ansible.builtin.package:
        name: audit
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure auditd is running
      ansible.builtin.systemd:
        name: auditd
        state: started
        enabled: true
      when: ansible_os_family == "RedHat"

    # 📜 Audit Rules
    - name: Ensure audit rules directory exists
      ansible.builtin.file:
        path: /etc/audit/rules.d
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Deploy auditd hardening rules
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/hardening.rules
        owner: root
        group: root
        mode: "0640"
        content: |
          -w /etc/passwd -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/sudoers -p wa -k sudoers
          -w /etc/ssh/sshd_config -p wa -k sshd
      notify: reload auditd rules

    # 🔒 SELinux Support (RHEL)
    - name: Install SELinux Python bindings
      ansible.builtin.package:
        name: python3-libselinux
        state: present
      when: ansible_os_family == "RedHat"

    - name: Set SELinux to enforcing
      ansible.posix.selinux:
        policy: targeted
        state: enforcing
      when: ansible_os_family == "RedHat"

    # ✅ Ensure SSH service is running
    - name: Ensure SSH service is running
      ansible.builtin.systemd:
        name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"
        state: started
        enabled: true

  handlers:

    - name: restart ssh
      ansible.builtin.systemd:
        name: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"
        state: restarted

    - name: reload firewalld
      ansible.builtin.command:
        cmd: firewall-cmd --reload
      changed_when: true
      when: ansible_os_family == "RedHat"

    - name: reload auditd rules
      ansible.builtin.command:
        cmd: augenrules --load
      changed_when: true
      when: ansible_os_family == "RedHat"