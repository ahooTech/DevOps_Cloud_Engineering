---
# ============================================================
# WINDOWS HARDENING + ENABLE HTTPS WINRM
# RUN THIS FIRST USING:
# ansible_port=5985
# ansible_winrm_scheme=http
# ansible-playbook -i ansible/inventory.ini ansible/playbooks/windows-baseline.yml
# ============================================================

- name: Windows Baseline Hardening + HTTPS WinRM Setup
  hosts: windows
  gather_facts: false

  tasks:

    - name: Enable Windows Firewall Profiles
      ansible.windows.win_firewall:
        state: enabled
        profiles:
          - Domain
          - Private
          - Public

    - name: Disable SMBv1
      ansible.windows.win_shell: |
        Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart

    - name: Disable PowerShell v2 (safe)
      ansible.windows.win_shell: |
        if (Get-WindowsOptionalFeature -Online -FeatureName MicrosoftWindowsPowerShellV2Root -ErrorAction SilentlyContinue) {
            Disable-WindowsOptionalFeature -Online -FeatureName MicrosoftWindowsPowerShellV2Root -NoRestart
        }
        else {
            Write-Output "PowerShell v2 not present - skipping"
        }

    - name: Disable RDP
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 1
        type: dword

    - name: Enable Windows Defender Realtime Protection
      ansible.windows.win_shell: |
        Set-MpPreference -DisableRealtimeMonitoring $false

    - name: Enable Script Block Logging
      ansible.windows.win_regedit:
        path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
        name: EnableScriptBlockLogging
        data: 1
        type: dword

    - name: Ensure Windows Time Service
      ansible.windows.win_service:
        name: w32time
        start_mode: auto
        state: started

    - name: Block Legacy Ports
      community.windows.win_firewall_rule:
        name: "{{ item.name }}"
        localport: "{{ item.port }}"
        action: block
        direction: in
        protocol: "{{ item.proto }}"
        state: present
      loop:
        - { name: "Block Telnet", port: 23, proto: tcp }
        - { name: "Block FTP", port: 21, proto: tcp }
        - { name: "Block NetBIOS 137", port: 137, proto: udp }
        - { name: "Block NetBIOS 138", port: 138, proto: udp }
        - { name: "Block NetBIOS 139", port: 139, proto: tcp }

    - name: Create temp directory
      ansible.windows.win_file:
        path: C:\Temp
        state: directory

    - name: Copy firewall script
      ansible.windows.win_copy:
        src: ../../windows/hardening/firewall-rules.ps1
        dest: C:\Temp\firewall-rules.ps1

    - name: Execute firewall script
      ansible.windows.win_shell: |
        powershell.exe -ExecutionPolicy Bypass -File C:\Temp\firewall-rules.ps1

    - name: Generate Self-Signed Certificate
      ansible.windows.win_shell: |
        $cert = New-SelfSignedCertificate `
          -DnsName $env:COMPUTERNAME `
          -CertStoreLocation cert:\LocalMachine\My

        Write-Output $cert.Thumbprint
      register: cert_out

    - name: Create HTTPS WinRM Listener
      ansible.windows.win_shell: |
        $thumb = "{{ cert_out.stdout | trim }}"

        winrm delete winrm/config/Listener?Address=*+Transport=HTTPS 2>$null

        winrm create winrm/config/Listener?Address=*+Transport=HTTPS "@{Hostname=`"$env:COMPUTERNAME`";CertificateThumbprint=`"$thumb`"}"

    - name: Allow HTTPS WinRM Firewall Rule
      community.windows.win_firewall_rule:
        name: "Allow WinRM HTTPS"
        localport: 5986
        protocol: tcp
        action: allow
        direction: in
        state: present

    - name: Final Message
      ansible.builtin.debug:
        msg: >
          HTTPS WinRM configured successfully.
          NEXT STEP:
          Update inventory.ini to:
          ansible_port=5986
          ansible_winrm_scheme=https